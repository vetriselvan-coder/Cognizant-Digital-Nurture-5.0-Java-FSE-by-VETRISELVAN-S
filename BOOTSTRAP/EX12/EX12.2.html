<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12.2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-5">
        Pricing Plans
    </h2>

    <div class="row">

        <div class="col-md-4">

            <div class="card p-4 m-3 text-center shadow">

                <h3>Basic</h3>

                <h4 class="text-primary">
                    ₹100
                </h4>

                <p>
                    Access to standard events.
                </p>

                <button class="btn btn-primary">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4 m-3 text-center shadow">

                <h3>Premium</h3>

                <h4 class="text-success">
                    ₹300
                </h4>

                <p>
                    Access to all premium events.
                </p>

                <button class="btn btn-success">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-4 m-3 text-center shadow">

                <h3>VIP</h3>

                <h4 class="text-danger">
                    ₹500
                </h4>

                <p>
                    Full access with VIP benefits.
                </p>

                <button class="btn btn-danger">
                    Choose Plan
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
