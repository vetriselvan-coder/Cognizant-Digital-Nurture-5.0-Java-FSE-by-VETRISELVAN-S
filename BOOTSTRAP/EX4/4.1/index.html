<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="row">

        <div class="col-md-3 bg-primary text-white p-4">
            <h3>Sidebar</h3>

            <ul class="list-group">
                <li class="list-group-item">Home</li>
                <li class="list-group-item">About</li>
                <li class="list-group-item">Services</li>
                <li class="list-group-item">Contact</li>
            </ul>
        </div>

        <div class="col-md-9 bg-light p-4">
            <h2>Main Content</h2>

            <p>
                This is the content area occupying
                9 columns in medium and larger devices.
            </p>

            <p>
                Bootstrap Grid System makes layouts
                responsive and easy to manage.
            </p>
        </div>

    </div>

</div>

</body>
</html>
