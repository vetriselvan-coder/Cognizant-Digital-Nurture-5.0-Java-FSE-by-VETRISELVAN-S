<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="display-1">
        Community Portal
    </h1>

    <h2 class="display-4">
        Upcoming Events
    </h2>

    <p class="lead">
        This is a lead paragraph used to highlight important information.
    </p>

    <p class="text-muted">
        This text appears muted and less prominent.
    </p>

    <p class="fw-bold">
        This text is bold using Bootstrap.
    </p>

    <p class="fst-italic">
        This text is italic.
    </p>

    <p class="text-decoration-underline">
        This text is underlined.
    </p>

</div>

</body>
</html>
