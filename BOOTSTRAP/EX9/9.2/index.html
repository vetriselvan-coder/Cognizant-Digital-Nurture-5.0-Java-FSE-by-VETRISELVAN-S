<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Groups</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Button Group</h2>

    <div class="btn-group">

        <button class="btn btn-primary">
            Home
        </button>

        <button class="btn btn-primary">
            About
        </button>

        <button class="btn btn-primary">
            Contact
        </button>

    </div>

    <hr>

    <h2>Toggle Buttons</h2>

    <input type="checkbox"
           class="btn-check"
           id="check1"
           autocomplete="off">

    <label class="btn btn-outline-success"
           for="check1">
        Music
    </label>

    <input type="checkbox"
           class="btn-check"
           id="check2"
           autocomplete="off">

    <label class="btn btn-outline-danger"
           for="check2">
        Sports
    </label>

    <input type="checkbox"
           class="btn-check"
           id="check3"
           autocomplete="off">

    <label class="btn btn-outline-primary"
           for="check3">
        Technology
    </label>

</div>

</body>
</html>
