<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inclusion Methods</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        /* Body Background Style */
        body {
            background-color: #f0f8ff;
        }
    </style>
</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">Welcome to CSS Styling Demo</h1>

    <header class="header">
        <h2>Header Section</h2>
    </header>

    <main class="content">
        <p>
            This paragraph is styled using the external stylesheet.
        </p>

        <button class="btn">Click Me</button>
    </main>

</body>
</html>
