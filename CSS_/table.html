<!DOCTYPE html>
<html>
<head>
    <title>Table Styling Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            border: 1px solid #333;
            padding: 12px;
        }

        th {
            background-color: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tr:hover {
            background-color: #d1ecf1;
        }
    </style>
</head>
<body>

    <h1>Event Admin Table</h1>

    <table>
        <tr>
            <th>Event ID</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Music Night</td>
            <td>10 June</td>
            <td>Approved</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Art Exhibition</td>
            <td>15 June</td>
            <td>Pending</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Clean-Up Drive</td>
            <td>20 June</td>
            <td>Completed</td>
        </tr>

        <tr>
            <td>104</td>
            <td>Health Camp</td>
            <td>25 June</td>
            <td>Approved</td>
        </tr>
    </table>

</body>
</html>
