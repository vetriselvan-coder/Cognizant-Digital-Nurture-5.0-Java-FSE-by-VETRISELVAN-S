<!DOCTYPE html>
<html>
<head>
    <title>Typography Demo</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }

        h1 {
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #2c3e50;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            font-style: italic;
            color: #34495e;
        }

        .description {
            font-size: 18px;
            font-weight: 300;
            text-align: justify;
            text-transform: capitalize;
            letter-spacing: 1px;
            line-height: 1.8;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>City Events Portal</h1>

    <h2>Upcoming Community Programs</h2>

    <p class="description">
        the city council organizes various programs and activities for residents.
        these events help strengthen community relationships and encourage public
        participation in local development initiatives.
    </p>

</body>
</html>
